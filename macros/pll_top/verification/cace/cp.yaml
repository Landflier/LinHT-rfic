#--------------------------------------------------------------
# CACE circuit characterization file for the cp macro
#
# The parameter specs double as the acceptance rubric for this
# macro (see doc/design_plan.md §12.6): the macro is "done" when
# all parameters are green at PVT + Monte Carlo.
#
# See macros/inverter/verification/cace/inverter.yaml for a
# complete, worked example.
#--------------------------------------------------------------

name:           cp
description:    cp macro of the LinHT_IC transceiver
PDK:            ihp-sg13g2

cace_format:    5.2

authorship:
  designer:         TODO
  company:          LinHT_IC project
  creation_date:    July 19, 2026
  license:          Apache-2.0 WITH SHL-2.1

paths:
  root:             ..
  schematic:        ../schematic/xschem
  netlist:          cace/netlist
  documentation:    cace/_docs
  runs:             cace/_runs

pins:
  VDD:
    description: Positive analog power supply
    type: power
    direction: inout
    Vmin: 1.4
    Vmax: 1.6
  VSS:
    description: Analog ground
    type: ground
    direction: inout
  # TODO(pll_top): declare the signal pins of cp.

default_conditions:
  vdd:
    description: Analog power supply voltage
    display: VDD
    unit: V
    typical: 1.5
  corner_mos:
    description: Process corner MOSFET
    display: Corner MOSFET
    typical: tt
  corner_r:
    description: Process corner resistor
    display: Corner R
    typical: typ
  corner_c:
    description: Process corner capacitor
    display: Corner C
    typical: typ
  temp:
    description: Ambient temperature
    display: Temperature
    unit: °C
    typical: 27

parameters: {}
